<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>JAXEN'S BLIND BOX</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020509;
      --card: #060d14;
      --border: #0a2535;
      --cyan: #00e5ff;
      --cyan-dim: #005a70;
      --cyan-glow: rgba(0,229,255,0.18);
      --magenta: #ff2d78;
      --purple: #9b5de5;
      --cream: #b8e8f0;
      --muted: #2a6070;
      --rare: #9b5de5;
      --secret: #00ff9f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      color: var(--cream);
      padding: 32px 16px;
      overflow-x: hidden;
      touch-action: pan-y;
      position: relative;
    }

    /* ── MATRIX RAIN ── */
    #rain { position: fixed; inset: 0; z-index: 0; opacity: 0.07; pointer-events: none; }

    /* ── SCANLINES ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.18) 2px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 1000;
    }

    /* ── CORNER BRACKETS ── */
    .corner { position: fixed; width: 40px; height: 40px; opacity: 0.4; z-index: 2; }
    .corner::before, .corner::after { content: ''; position: absolute; background: var(--cyan); }
    .corner::before { width: 100%; height: 2px; }
    .corner::after  { width: 2px; height: 100%; }
    .corner.tl { top: 12px; left: 12px; }
    .corner.tr { top: 12px; right: 12px; transform: scaleX(-1); }
    .corner.bl { bottom: 12px; left: 12px; transform: scaleY(-1); }
    .corner.br { bottom: 12px; right: 12px; transform: scale(-1); }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    /* ── HEADER ── */
    .header { text-align: center; position: relative; }

    .sys-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.25em;
      margin-bottom: 6px;
    }

    .title {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 900;
      color: var(--cyan);
      letter-spacing: 0.08em;
      text-shadow: 0 0 20px rgba(0,229,255,0.8), 0 0 40px rgba(0,229,255,0.3);
      animation: glitch 8s infinite;
      line-height: 1.2;
    }

    @keyframes glitch {
      0%,94%,100% { text-shadow: 0 0 20px rgba(0,229,255,0.8), 0 0 40px rgba(0,229,255,0.3); transform: none; }
      95%  { text-shadow: -2px 0 var(--magenta), 2px 0 var(--cyan); transform: translate(-1px, 0); }
      96%  { text-shadow: 2px 0 var(--magenta), -2px 0 var(--cyan); transform: translate(2px, 0); }
      97%  { text-shadow: 0 0 20px rgba(0,229,255,0.8); transform: none; }
      98%  { text-shadow: -1px 0 var(--magenta), 1px 0 var(--cyan); transform: translate(-1px,1px); }
      99%  { text-shadow: 0 0 20px rgba(0,229,255,0.8); transform: none; }
    }

    .subtitle {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.2em;
      margin-top: 6px;
    }

    .subtitle span { color: var(--cyan); opacity: 0.7; }

    /* ── BOX SCENE ── */
    .box-scene {
      position: relative;
      width: 220px;
      height: 260px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    .box-wrapper {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    /* seal / top ornament instead of bow */
    .seal-wrap {
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      transition: opacity 0.3s ease;
    }
    .seal-wrap.hidden { opacity: 0; pointer-events: none; }

    /* lid — dark panel with cyan trim */
    .lid {
      width: 188px;
      height: 48px;
      background: linear-gradient(160deg, #0a1e2e 0%, #061218 100%);
      border-radius: 4px 4px 0 0;
      border: 1px solid var(--cyan);
      border-bottom: none;
      transform-origin: 50% 0%;
      transition: transform 0.65s cubic-bezier(0.34, 1.3, 0.64, 1);
      box-shadow: 0 -2px 20px rgba(0,229,255,0.35), inset 0 0 20px rgba(0,229,255,0.05);
      z-index: 4;
      position: relative;
      overflow: hidden;
    }

    /* circuit lines on lid */
    .lid::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 48%, rgba(0,229,255,0.2) 50%, transparent 52%),
        linear-gradient(180deg, transparent 40%, rgba(0,229,255,0.1) 50%, transparent 60%);
    }

    .lid::after {
      content: '◈';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      color: var(--cyan);
      opacity: 0.6;
      animation: spin 12s linear infinite;
    }

    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    /* body */
    .body {
      width: 180px;
      height: 165px;
      background: linear-gradient(160deg, #08141e 0%, #040c14 100%);
      border-radius: 0 0 6px 6px;
      border: 1px solid var(--cyan);
      border-top: none;
      position: relative;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8), 0 0 30px rgba(0,229,255,0.15);
      overflow: hidden;
    }

    /* circuit grid on body */
    .body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    /* vertical neon stripe */
    .body::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--cyan), transparent);
      opacity: 0.25;
    }

    .box-shadow {
      width: 160px;
      height: 10px;
      background: radial-gradient(ellipse, rgba(0,229,255,0.2) 0%, transparent 70%);
      margin: 0 auto;
    }

    /* trinket float */
    .trinket-float {
      position: absolute;
      bottom: 195px;
      left: 50%;
      transform: translateX(-50%) scale(0) translateY(20px);
      opacity: 0;
      transition: transform 0.55s cubic-bezier(0.34, 1.5, 0.64, 1), opacity 0.3s ease;
      z-index: 10;
    }
    .trinket-float svg { width: 110px; height: 110px; display: block; }

    /* swipe arrow */
    .swipe-hint-arrow {
      position: absolute;
      bottom: 215px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 6;
      pointer-events: none;
    }
    .swipe-hint-arrow.show { opacity: 1; }

    .lid.dragging { transition: none; }

    /* ── STATES ── */
    .box-scene.shaking .box-wrapper { animation: shake 0.45s ease-in-out; }
    .box-scene.opened .lid { transform: rotateX(-120deg) translateY(-6px); }
    .box-scene.opened .seal-wrap { opacity: 0; }
    .box-scene.opened .trinket-float {
      opacity: 1;
      transform: translateX(-50%) scale(1) translateY(0);
      animation: floatBob 3s ease-in-out 0.55s infinite;
    }

    @keyframes shake {
      0%,100% { transform: translateX(-50%) rotate(0deg); }
      12%  { transform: translateX(-50%) rotate(-5deg) translateX(-4px); }
      25%  { transform: translateX(-50%) rotate( 5deg) translateX( 4px); }
      37%  { transform: translateX(-50%) rotate(-4deg) translateX(-3px); }
      50%  { transform: translateX(-50%) rotate( 4deg) translateX( 3px); }
      62%  { transform: translateX(-50%) rotate(-2deg) translateX(-2px); }
      75%  { transform: translateX(-50%) rotate( 2deg) translateX( 2px); }
    }
    @keyframes floatBob {
      0%,100% { transform: translateX(-50%) scale(1) translateY(0); }
      50%      { transform: translateX(-50%) scale(1) translateY(-9px); }
    }

    /* ── HINT ── */
    .hint {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      animation: blinkHint 2.2s ease-in-out infinite;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hint .arr { display: inline-block; color: var(--cyan); animation: bounceUp 1.4s ease-in-out infinite; }
    .hint.hide { visibility: hidden; }
    @keyframes blinkHint { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes bounceUp  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

    /* ── CARD ── */
    .card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px 18px;
      text-align: center;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.45s ease, transform 0.45s ease;
      pointer-events: none;
      position: relative;
      overflow: hidden;
    }
    /* cyan corner accents on card */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border-color: var(--cyan);
      border-style: solid;
      opacity: 0.5;
    }
    .card::before { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
    .card::after  { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }
    .card.show { opacity: 1; transform: translateY(0); pointer-events: all; }

    .badge {
      display: inline-block;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 3px 12px;
      border-radius: 2px;
      margin-bottom: 10px;
    }
    .badge.common  { background: rgba(42,96,112,0.2); color: var(--muted); border: 1px solid var(--cyan-dim); }
    .badge.troll   { background: rgba(255,45,120,0.1); color: #ff6699; border: 1px solid rgba(255,45,120,0.3); }
    .badge.rare    { background: rgba(155,93,229,0.12); color: var(--rare); border: 1px solid rgba(155,93,229,0.3); }
    .badge.secret  { background: rgba(0,255,159,0.1); color: var(--secret); border: 1px solid rgba(0,255,159,0.3); }
    .badge.special { background: rgba(255,45,120,0.15); color: var(--magenta); border: 1px solid rgba(255,45,120,0.4); }

    .tname {
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 8px;
      text-shadow: 0 0 12px rgba(0,229,255,0.5);
      line-height: 1.3;
    }
    .flavor { font-size: 11px; color: #4a8090; line-height: 1.7; font-style: italic; }

    /* ── BUTTON ── */
    .btn {
      background: transparent;
      border: 1px solid var(--cyan-dim);
      color: var(--cyan);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      padding: 11px 28px;
      border-radius: 3px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px);
      transition: opacity 0.3s ease, transform 0.3s ease, background 0.2s, box-shadow 0.2s;
      text-transform: uppercase;
    }
    .btn.show { opacity: 1; pointer-events: all; transform: translateY(0); }
    .btn:hover { background: rgba(0,229,255,0.06); border-color: var(--cyan); box-shadow: 0 0 12px rgba(0,229,255,0.2); }
    .btn:active { background: rgba(0,229,255,0.12); }

    /* ── PARTICLES ── */
    .p-layer { position: fixed; inset: 0; pointer-events: none; z-index: 200; overflow: hidden; }
    .pt { position: absolute; border-radius: 50%; animation: pfly 1.1s ease-out forwards; }
    @keyframes pfly {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.2); }
    }
  </style>
</head>
<body>

<!-- corner brackets -->
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- matrix rain -->
<canvas id="rain"></canvas>

<div class="p-layer" id="pLayer"></div>

<div class="container">

  <div class="header">
    <div class="sys-label">// SYSTEM: INITIALIZED · PULL_COUNT: <span id="pullCount">00</span></div>
    <div class="title">JAXEN'S<br>BLIND BOX</div>
    <div class="subtitle">ONE PULL · <span>INFINITE POSSIBILITIES</span></div>
  </div>

  <div class="box-scene" id="scene">
    <div class="trinket-float" id="trinketFloat">
      <svg id="trinketSvg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <!-- swipe up arrow -->
    <div class="swipe-hint-arrow" id="swipeArrow">
      <svg width="30" height="40" viewBox="0 0 30 40" fill="none">
        <line x1="15" y1="36" x2="15" y2="6" stroke="rgba(0,229,255,0.7)" stroke-width="1.5"/>
        <polyline points="6,16 15,4 24,16" stroke="rgba(0,229,255,0.7)" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
        <animateTransform attributeName="transform" type="translate" values="0 6;0 0;0 6" dur="1.2s" repeatCount="indefinite"/>
      </svg>
    </div>

    <div class="box-wrapper" id="boxWrapper">

      <!-- holographic seal instead of bow -->
      <div class="seal-wrap" id="sealWrap">
        <svg width="70" height="34" viewBox="0 0 70 34" fill="none">
          <!-- seal hexagon -->
          <polygon points="35,4 54,14 54,26 35,34 16,26 16,14" fill="rgba(0,229,255,0.05)" stroke="rgba(0,229,255,0.5)" stroke-width="1"/>
          <!-- inner lines -->
          <line x1="16" y1="14" x2="54" y2="26" stroke="rgba(0,229,255,0.2)" stroke-width="0.5"/>
          <line x1="16" y1="26" x2="54" y2="14" stroke="rgba(0,229,255,0.2)" stroke-width="0.5"/>
          <line x1="35" y1="4" x2="35" y2="34" stroke="rgba(0,229,255,0.2)" stroke-width="0.5"/>
          <!-- center dot -->
          <circle cx="35" cy="19" r="4" fill="rgba(0,229,255,0.15)" stroke="rgba(0,229,255,0.6)" stroke-width="1"/>
          <circle cx="35" cy="19" r="1.5" fill="rgba(0,229,255,0.8)"/>
          <!-- side lines -->
          <line x1="0" y1="19" x2="14" y2="19" stroke="rgba(0,229,255,0.4)" stroke-width="1"/>
          <line x1="56" y1="19" x2="70" y2="19" stroke="rgba(0,229,255,0.4)" stroke-width="1"/>
        </svg>
      </div>

      <div class="lid" id="lid"></div>
      <div class="body"></div>
      <div class="box-shadow"></div>
    </div>
  </div>

  <div class="hint" id="hint">
    <span class="arr">↑</span>
    <span>swipe up to open</span>
    <span class="arr">↑</span>
  </div>

  <div class="card" id="card">
    <div class="badge" id="badge">COMMON</div>
    <div class="tname" id="tname">—</div>
    <div class="flavor" id="flavor">—</div>
  </div>

  <button class="btn" id="btn" onclick="doReset()">[ PULL AGAIN ]</button>

</div>

<script>
// ── MATRIX RAIN ──────────────────────────────────────────────────
(function(){
  const canvas = document.getElementById('rain');
  const ctx = canvas.getContext('2d');
  const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノ';
  let cols, drops;
  function resize(){
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    cols  = Math.floor(canvas.width / 16);
    drops = Array(cols).fill(1);
  }
  resize();
  window.addEventListener('resize', resize);
  setInterval(()=>{
    ctx.fillStyle = 'rgba(2,5,9,0.05)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#00e5ff';
    ctx.font = '13px Share Tech Mono, monospace';
    drops.forEach((y,i)=>{
      const c = chars[Math.floor(Math.random()*chars.length)];
      ctx.fillText(c, i*16, y*16);
      if(y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    });
  }, 60);
})();

// ── RARITY PICKER ────────────────────────────────────────────────
function pickTrinket() {
  const r = Math.random();
  if (r < 0.03) return trinkets[12];                                    // secret: 3%
  if (r < 0.09) return trinkets[11];                                    // naked session: 6%
  if (r < 0.16) return trinkets[10];                                    // Luna: 7%
  if (r < 0.22) return trinkets[8];                                     // spider troll: 6%
  if (r < 0.32) return trinkets[4];                                     // pickle troll: 10%
  if (r < 0.44) return trinkets[6 + (Math.random() < 0.5 ? 0 : 1)];   // rare (cassette/telescope): 12%
  // commons: Crystal, Robot, Mushroom, RolyPoly, Fox, Rabbit
  const commons = [0,1,2,3,5,7]; // indices of common trinkets (skip telescope which is at 6)
  // wait — let me re-index. Let me just use the common ones by array reference
  return [trinkets[0],trinkets[1],trinkets[2],trinkets[3],trinkets[5],trinkets[9]][Math.floor(Math.random()*6)];
}

// ── PULL COUNTER ─────────────────────────────────────────────────
let pullCount = 0;
function updateCounter() {
  pullCount++;
  document.getElementById('pullCount').textContent = String(pullCount).padStart(2,'0');
}

// ── SWIPE LOGIC ──────────────────────────────────────────────────
let phase = 'idle';
let picked = null;
let touchStartY = 0, touchStartX = 0, touchStartTime = 0;
let isDraggingLid = false;

const scene = document.getElementById('scene');
const lid   = document.getElementById('lid');
const hint  = document.getElementById('hint');
const swipeArrow = document.getElementById('swipeArrow');

scene.addEventListener('touchstart', (e) => {
  if (phase === 'opened') return;
  touchStartY = e.touches[0].clientY;
  touchStartX = e.touches[0].clientX;
  touchStartTime = Date.now();
  isDraggingLid = true;
  lid.classList.add('dragging');
}, { passive: true });

scene.addEventListener('touchmove', (e) => {
  if (!isDraggingLid || phase === 'opened') return;
  e.preventDefault();
  const dy = touchStartY - e.touches[0].clientY;
  const dx = Math.abs(touchStartX - e.touches[0].clientX);
  if (dy > 0 && dy > dx) {
    const progress = Math.min(dy / 120, 1);
    lid.style.transform = `rotateX(${progress * -120}deg)`;
  }
}, { passive: false });

scene.addEventListener('touchend', (e) => {
  if (phase === 'opened') return;
  isDraggingLid = false;
  lid.classList.remove('dragging');
  const dy = touchStartY - e.changedTouches[0].clientY;
  const dx = Math.abs(touchStartX - e.changedTouches[0].clientX);
  const elapsed = Date.now() - touchStartTime;
  const velocity = dy / elapsed;
  if ((dy > 60 && dy > dx) || (velocity > 0.5 && dy > 20 && dy > dx)) {
    doOpen();
  } else {
    lid.style.transform = '';
    if (dy < 10 && dx < 10) doShake();
  }
}, { passive: true });

// desktop click fallback
scene.addEventListener('click', () => { if (phase === 'idle') doShake(); });

function doShake() {
  if (phase !== 'idle') return;
  picked = pickTrinket();
  scene.classList.add('shaking');
  hint.classList.add('hide');
  swipeArrow.classList.add('show');
  setTimeout(() => {
    scene.classList.remove('shaking');
    hint.innerHTML = '<span class="arr">↑</span><span>now swipe up</span><span class="arr">↑</span>';
    hint.classList.remove('hide');
  }, 500);
}

function doOpen() {
  if (phase === 'opened') return;
  phase = 'opened';
  updateCounter();
  lid.style.transform = '';
  scene.classList.add('opened');
  swipeArrow.classList.remove('show');
  hint.classList.add('hide');

  const svg = document.getElementById('trinketSvg');
  svg.innerHTML = picked.svg;
  svg.style.filter = `drop-shadow(0 0 20px ${picked.glow})`;

  setTimeout(spawnParticles, 180);

  setTimeout(() => {
    const badge = document.getElementById('badge');
    badge.className = 'badge ' + picked.rarity;
    const labels = {
      common:  '// COMMON',
      rare:    '// RARE_CLASS',
      troll:   '⚠ BREACH.EXE',
      secret:  '█ CLASSIFIED █',
      special: '♥ SPECIAL UNLOCK ♥'
    };
    badge.textContent = labels[picked.rarity];

    // handle multiline name
    const nameEl = document.getElementById('tname');
    nameEl.innerHTML = picked.name.replace('\n', '<br>');
    document.getElementById('flavor').textContent = picked.flavor;
    document.getElementById('card').classList.add('show');
    document.getElementById('btn').classList.add('show');
  }, 600);
}

function doReset() {
  phase = 'idle'; picked = null;
  scene.classList.remove('opened', 'shaking');
  lid.style.transform = '';
  document.getElementById('trinketSvg').innerHTML = '';
  document.getElementById('card').classList.remove('show');
  document.getElementById('btn').classList.remove('show');
  swipeArrow.classList.remove('show');
  hint.innerHTML = '<span class="arr">↑</span><span>swipe up to open</span><span class="arr">↑</span>';
  hint.classList.remove('hide');
  document.getElementById('sealWrap').classList.remove('hidden');
}

// ── PARTICLES ────────────────────────────────────────────────────
function spawnParticles() {
  const colors = ['#00e5ff','#ff2d78','#9b5de5','#00ff9f','#b8e8f0','#ffffff'];
  const s = document.getElementById('scene').getBoundingClientRect();
  const cx = s.left + s.width / 2, cy = s.top + s.height * 0.35;
  const layer = document.getElementById('pLayer');
  for (let i = 0; i < 32; i++) {
    const p = document.createElement('div');
    p.className = 'pt';
    const angle = (i / 32) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
    const dist = 80 + Math.random() * 130, size = 3 + Math.random() * 8;
    p.style.cssText = `left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;animation-delay:${Math.random()*0.15}s;box-shadow:0 0 6px currentColor;`;
    layer.appendChild(p);
    setTimeout(() => p.remove(), 1400);
  }
}
</script>
