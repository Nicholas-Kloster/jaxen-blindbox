<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>JAXEN'S BLIND BOX</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@400;500;600;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1a0d1f;
      --bg-2: #0f0615;
      --card: #26122e;
      --border: #4a1e5c;
      --pink: #ff6ec7;
      --pink-dim: #8a3a6a;
      --pink-soft: #ffb3d9;
      --pink-glow: rgba(255,110,199,0.22);
      --lavender: #c77dff;
      --lavender-dim: #7a4a96;
      --cream: #ffe6f5;
      --muted: #9a6a9a;
      --rare: #c77dff;
      --troll: #ff6ec7;
      --secret: #ffd966;
      --special: #ff9ac8;
      --gold: #ffd966;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background:
        radial-gradient(ellipse at top, #2a1035 0%, transparent 60%),
        radial-gradient(ellipse at bottom, #1f0828 0%, transparent 60%),
        var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Quicksand', sans-serif;
      color: var(--cream);
      padding: 32px 16px;
      overflow-x: hidden;
      touch-action: pan-y;
      position: relative;
    }

    #rain { position: fixed; inset: 0; z-index: 0; opacity: 0.4; pointer-events: none; }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,110,199,0.05), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(199,125,255,0.05), transparent 40%);
      pointer-events: none;
      z-index: 1000;
    }

    .corner {
      position: fixed;
      font-size: 20px;
      color: var(--pink);
      opacity: 0.55;
      z-index: 2;
      text-shadow: 0 0 8px var(--pink);
      animation: twinkle 3s ease-in-out infinite;
    }
    .corner.tl { top: 14px; left: 14px; }
    .corner.tr { top: 14px; right: 14px; animation-delay: 0.7s; }
    .corner.bl { bottom: 14px; left: 14px; animation-delay: 1.4s; }
    .corner.br { bottom: 14px; right: 14px; animation-delay: 2.1s; }
    @keyframes twinkle {
      0%,100% { opacity: 0.4; transform: scale(1); }
      50%     { opacity: 0.8; transform: scale(1.15); }
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .header { text-align: center; position: relative; }

    .sys-label {
      font-family: 'Quicksand', sans-serif;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.3em;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .sys-label span { color: var(--pink); font-weight: 700; }

    .title {
      font-family: 'Fredoka', sans-serif;
      font-size: 30px;
      font-weight: 700;
      color: var(--pink-soft);
      letter-spacing: 0.03em;
      text-shadow:
        0 0 20px rgba(255,110,199,0.7),
        0 0 40px rgba(199,125,255,0.35);
      animation: shimmer 6s ease-in-out infinite;
      line-height: 1.05;
    }

    @keyframes shimmer {
      0%,100% { text-shadow: 0 0 20px rgba(255,110,199,0.7), 0 0 40px rgba(199,125,255,0.35); }
      50%     { text-shadow: 0 0 28px rgba(255,179,217,0.95), 0 0 48px rgba(199,125,255,0.55); }
    }

    .subtitle {
      font-family: 'Caveat', cursive;
      font-size: 18px;
      color: var(--pink);
      margin-top: 10px;
      opacity: 0.9;
    }
    .subtitle .hrt { color: var(--gold); margin: 0 6px; }

    .box-scene {
      position: relative;
      width: 220px;
      height: 260px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    .box-wrapper {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    .seal-wrap {
      position: absolute;
      top: -32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      transition: opacity 0.3s ease;
    }
    .seal-wrap.hidden { opacity: 0; pointer-events: none; }

    .lid {
      width: 188px;
      height: 48px;
      background: linear-gradient(160deg, #3a1245 0%, #22092b 100%);
      border-radius: 10px 10px 0 0;
      border: 1.5px solid var(--pink);
      border-bottom: none;
      transform-origin: 50% 0%;
      transition: transform 0.65s cubic-bezier(0.34, 1.3, 0.64, 1);
      box-shadow:
        0 -2px 22px rgba(255,110,199,0.45),
        inset 0 0 22px rgba(199,125,255,0.12);
      z-index: 4;
      position: relative;
      overflow: hidden;
    }

    .lid::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 50%, rgba(255,217,102,0.4) 0%, transparent 4%),
        radial-gradient(circle at 75% 30%, rgba(255,179,217,0.5) 0%, transparent 3%),
        radial-gradient(circle at 50% 70%, rgba(199,125,255,0.4) 0%, transparent 3%),
        radial-gradient(circle at 85% 80%, rgba(255,217,102,0.35) 0%, transparent 3%);
    }

    .lid::after {
      content: '♥';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 22px;
      color: var(--pink-soft);
      opacity: 0.85;
      text-shadow: 0 0 10px var(--pink);
      animation: heartBeat 2s ease-in-out infinite;
    }

    @keyframes heartBeat {
      0%,100% { transform: translate(-50%, -50%) scale(1); }
      50%     { transform: translate(-50%, -50%) scale(1.18); }
    }

    .body {
      width: 180px;
      height: 165px;
      background: linear-gradient(160deg, #2a0f38 0%, #18071f 100%);
      border-radius: 0 0 12px 12px;
      border: 1.5px solid var(--pink);
      border-top: none;
      position: relative;
      box-shadow:
        0 8px 40px rgba(0,0,0,0.7),
        0 0 30px rgba(255,110,199,0.25);
      overflow: hidden;
    }

    .body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 25% 25%, rgba(255,179,217,0.08) 1.5px, transparent 2.5px),
        radial-gradient(circle at 75% 75%, rgba(199,125,255,0.08) 1.5px, transparent 2.5px);
      background-size: 30px 30px;
    }

    .body::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 10px;
      background: linear-gradient(to bottom, var(--pink) 0%, var(--lavender) 100%);
      opacity: 0.55;
      box-shadow: 0 0 10px var(--pink);
    }

    .box-shadow {
      width: 170px;
      height: 10px;
      background: radial-gradient(ellipse, rgba(255,110,199,0.3) 0%, transparent 70%);
      margin: 0 auto;
    }

    .trinket-float {
      position: absolute;
      bottom: 195px;
      left: 50%;
      transform: translateX(-50%) scale(0) translateY(20px);
      opacity: 0;
      transition: transform 0.55s cubic-bezier(0.34, 1.5, 0.64, 1), opacity 0.3s ease;
      z-index: 10;
    }
    .trinket-float svg { width: 120px; height: 120px; display: block; }

    .swipe-hint-arrow {
      position: absolute;
      bottom: 215px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 6;
      pointer-events: none;
    }
    .swipe-hint-arrow.show { opacity: 1; }

    .lid.dragging { transition: none; }

    .box-scene.shaking .box-wrapper { animation: shake 0.45s ease-in-out; }
    .box-scene.opened .lid { transform: rotateX(-120deg) translateY(-6px); }
    .box-scene.opened .seal-wrap { opacity: 0; }
    .box-scene.opened .trinket-float {
      opacity: 1;
      transform: translateX(-50%) scale(1) translateY(0);
      animation: floatBob 3s ease-in-out 0.55s infinite;
    }

    @keyframes shake {
      0%,100% { transform: translateX(-50%) rotate(0deg); }
      12%  { transform: translateX(-50%) rotate(-5deg) translateX(-4px); }
      25%  { transform: translateX(-50%) rotate( 5deg) translateX( 4px); }
      37%  { transform: translateX(-50%) rotate(-4deg) translateX(-3px); }
      50%  { transform: translateX(-50%) rotate( 4deg) translateX( 3px); }
      62%  { transform: translateX(-50%) rotate(-2deg) translateX(-2px); }
      75%  { transform: translateX(-50%) rotate( 2deg) translateX( 2px); }
    }
    @keyframes floatBob {
      0%,100% { transform: translateX(-50%) scale(1) translateY(0); }
      50%     { transform: translateX(-50%) scale(1) translateY(-9px); }
    }

    .hint {
      font-family: 'Quicksand', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--pink-soft);
      animation: blinkHint 2.2s ease-in-out infinite;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hint .arr { display: inline-block; color: var(--pink); animation: bounceUp 1.4s ease-in-out infinite; font-size: 14px; }
    .hint.hide { visibility: hidden; }
    @keyframes blinkHint { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    @keyframes bounceUp  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

    .card {
      width: 100%;
      background: linear-gradient(160deg, var(--card) 0%, #1e0a24 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px 20px;
      text-align: center;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.45s ease, transform 0.45s ease;
      pointer-events: none;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 30px rgba(255,110,199,0.12);
    }
    .card::before, .card::after {
      content: '♥';
      position: absolute;
      color: var(--pink);
      opacity: 0.35;
      font-size: 14px;
    }
    .card::before { top: 8px; left: 12px; }
    .card::after  { bottom: 8px; right: 12px; }
    .card.show { opacity: 1; transform: translateY(0); pointer-events: all; }

    .badge {
      display: inline-block;
      font-family: 'Quicksand', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .badge.common  { background: rgba(154,106,154,0.15); color: var(--muted); border: 1px solid rgba(154,106,154,0.4); }
    .badge.troll   { background: rgba(255,110,199,0.12); color: var(--pink); border: 1px solid rgba(255,110,199,0.4); }
    .badge.rare    { background: rgba(199,125,255,0.14); color: var(--lavender); border: 1px solid rgba(199,125,255,0.4); }
    .badge.secret  { background: rgba(255,217,102,0.12); color: var(--secret); border: 1px solid rgba(255,217,102,0.4); box-shadow: 0 0 10px rgba(255,217,102,0.2); }
    .badge.special { background: rgba(255,154,200,0.18); color: var(--special); border: 1px solid rgba(255,154,200,0.5); box-shadow: 0 0 10px rgba(255,154,200,0.25); }

    .tname {
      font-family: 'Fredoka', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--pink-soft);
      margin-bottom: 10px;
      text-shadow: 0 0 14px rgba(255,110,199,0.4);
      line-height: 1.2;
    }
    .flavor {
      font-family: 'Caveat', cursive;
      font-size: 18px;
      color: var(--pink-soft);
      line-height: 1.4;
      opacity: 0.88;
    }

    .btn {
      background: linear-gradient(135deg, var(--pink) 0%, var(--lavender) 100%);
      border: none;
      color: white;
      font-family: 'Fredoka', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 14px 32px;
      border-radius: 30px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px);
      transition: opacity 0.3s, transform 0.3s, box-shadow 0.2s, filter 0.2s;
      text-transform: uppercase;
      box-shadow: 0 4px 20px rgba(255,110,199,0.35);
    }
    .btn.show { opacity: 1; pointer-events: all; transform: translateY(0); }
    .btn:hover { filter: brightness(1.1); box-shadow: 0 4px 26px rgba(255,110,199,0.55); }
    .btn:active { transform: scale(0.97); }

    .p-layer { position: fixed; inset: 0; pointer-events: none; z-index: 200; overflow: hidden; }
    .pt { position: absolute; border-radius: 50%; animation: pfly 1.2s ease-out forwards; }
    @keyframes pfly {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.2); }
    }
  </style>
</head>
<body>

<div class="corner tl">✦</div>
<div class="corner tr">♥</div>
<div class="corner bl">♥</div>
<div class="corner br">✦</div>

<canvas id="rain"></canvas>

<div class="p-layer" id="pLayer"></div>

<div class="container">

  <div class="header">
    <div class="sys-label">pulls · <span id="pullCount">00</span></div>
    <div class="title">JAXEN'S<br>BLIND BOX</div>
    <div class="subtitle">one pull <span class="hrt">✦</span> infinite possibilities</div>
  </div>

  <div class="box-scene" id="scene">
    <div class="trinket-float" id="trinketFloat">
      <svg id="trinketSvg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div class="swipe-hint-arrow" id="swipeArrow">
      <svg width="30" height="40" viewBox="0 0 30 40" fill="none">
        <line x1="15" y1="36" x2="15" y2="6" stroke="rgba(255,110,199,0.8)" stroke-width="1.8"/>
        <polyline points="6,16 15,4 24,16" stroke="rgba(255,110,199,0.8)" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
        <animateTransform attributeName="transform" type="translate" values="0 6;0 0;0 6" dur="1.2s" repeatCount="indefinite"/>
      </svg>
    </div>

    <div class="box-wrapper" id="boxWrapper">

      <div class="seal-wrap" id="sealWrap">
        <svg width="80" height="36" viewBox="0 0 80 36" fill="none">
          <path d="M40 32 C40 32 14 20 14 12 C14 6 19 2 24 4 C28 6 30 10 40 14 C50 10 52 6 56 4 C61 2 66 6 66 12 C66 20 40 32 40 32Z" fill="rgba(255,110,199,0.18)" stroke="var(--pink)" stroke-width="1"/>
          <line x1="0" y1="18" x2="12" y2="18" stroke="rgba(255,110,199,0.5)" stroke-width="1"/>
          <line x1="68" y1="18" x2="80" y2="18" stroke="rgba(255,110,199,0.5)" stroke-width="1"/>
          <circle cx="40" cy="18" r="2.5" fill="rgba(255,217,102,0.8)"/>
        </svg>
      </div>

      <div class="lid" id="lid"></div>
      <div class="body"></div>
      <div class="box-shadow"></div>
    </div>
  </div>

  <div class="hint" id="hint">
    <span class="arr">↑</span>
    <span>swipe up to open</span>
    <span class="arr">↑</span>
  </div>

  <div class="card" id="card">
    <div class="badge" id="badge">COMMON</div>
    <div class="tname" id="tname">—</div>
    <div class="flavor" id="flavor">—</div>
  </div>

  <button class="btn" id="btn" onclick="doReset()">pull again</button>

</div>

<script>
// ── SPARKLE RAIN ─────────────────────────────────────────────────
(function(){
  const canvas = document.getElementById('rain');
  const ctx = canvas.getContext('2d');
  const chars = ['✦','♥','♡','✧','·','*'];
  const colors = ['#ff6ec7','#c77dff','#ffd966','#ffb3d9','#ff9ac8'];
  let particles = [];
  function resize(){
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    const count = Math.floor((canvas.width * canvas.height) / 9000);
    particles = [];
    for (let i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vy: 0.2 + Math.random() * 0.9,
        size: 7 + Math.random() * 11,
        char: chars[Math.floor(Math.random() * chars.length)],
        color: colors[Math.floor(Math.random() * colors.length)],
        drift: (Math.random() - 0.5) * 0.25,
        opacity: 0.3 + Math.random() * 0.5
      });
    }
  }
  resize();
  window.addEventListener('resize', resize);
  function frame() {
    ctx.fillStyle = 'rgba(26,13,31,0.12)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.font = p.size + 'px sans-serif';
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.opacity;
      ctx.fillText(p.char, p.x, p.y);
      p.y += p.vy;
      p.x += p.drift;
      if (p.y > canvas.height + 20) {
        p.y = -20;
        p.x = Math.random() * canvas.width;
      }
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(frame);
  }
  frame();
})();

// ── TRINKETS ─────────────────────────────────────────────────────
const trinkets = [
  // 0 — Crystal Orb (common, recolored pink)
  {
    name: "Crystal Orb", rarity: "common",

    svg: `<defs><radialGradient id="g1" cx="36%" cy="30%" r="65%"><stop offset="0%" stop-color="#fff0f8"/><stop offset="55%" stop-color="#ff9ac8"/><stop offset="100%" stop-color="#9a3a8a"/></radialGradient></defs>

    <ellipse cx="50" cy="90" rx="24" ry="5" fill="rgba(255,110,199,0.18)"/>`
  },
  // 1 — Tiny Robot (common, recolored pink)
  {
    name: "Tiny Robot", rarity: "common",
    flavor: "Beeps once. Then twice. Seems satisfied with itself.",
    glow: "rgba(255,110,199,0.65)",
    svg: `<rect x="29" y="29" width="42" height="36" rx="8" fill="#3a1245"/>
    <rect x="29" y="29" width="42" height="36" rx="8" fill="none" stroke="#ff6ec7" stroke-width="1.2" opacity="0.85"/>
    <rect x="37" y="18" width="26" height="15" rx="6" fill="#2a0f38"/>
    <rect x="37" y="18" width="26" height="15" rx="6" fill="none" stroke="#ff6ec7" stroke-width="0.9" opacity="0.75"/>

    <circle cx="40.5" cy="42.5" r="1.2" fill="white" opacity="0.85"/>

    <circle cx="58" cy="60" r="1" fill="#ffd966" opacity="0.7"/>
    <rect x="22" y="36" width="9" height="16" rx="4" fill="#2a0f38" stroke="#ff6ec7" stroke-width="0.9" opacity="0.85"/>
    <rect x="69" y="36" width="9" height="16" rx="4" fill="#2a0f38" stroke="#ff6ec7" stroke-width="0.9" opacity="0.85"/>
    <rect x="34" y="65" width="11" height="18" rx="5" fill="#2a0f38" stroke="#ff6ec7" stroke-width="0.9" opacity="0.75"/>
    <rect x="55" y="65" width="11" height="18" rx="5" fill="#2a0f38" stroke="#ff6ec7" stroke-width="0.9" opacity="0.75"/>
    <ellipse cx="50" cy="90" rx="24" ry="4" fill="rgba(255,110,199,0.15)"/>`
  },
  // 2 — Moon Mushroom (common, already purple-friendly)
  {
    name: "Moon Mushroom", rarity: "common",
    flavor: "Glows faintly at 2am. Smells like petrichor and something older.",
    glow: "rgba(199,125,255,0.7)",
    svg: `<defs><radialGradient id="g2" cx="40%" cy="32%" r="68%"><stop offset="0%" stop-color="#ffd0ff"/><stop offset="100%" stop-color="#7a2aa8"/></radialGradient></defs>
    <ellipse cx="50" cy="46" rx="35" ry="28" fill="url(#g2)"/>
    <circle cx="37" cy="40" r="5.5" fill="white" opacity="0.32"/>
    <circle cx="57" cy="33" r="4" fill="white" opacity="0.25"/>
    <circle cx="44" cy="53" r="3" fill="white" opacity="0.22"/>
    <circle cx="63" cy="46" r="3.5" fill="white" opacity="0.2"/>
    <rect x="43" y="68" width="14" height="20" rx="5" fill="#e8d8f8"/>
    <ellipse cx="50" cy="68" rx="10" ry="4" fill="#f0e0ff"/>
    <text x="50" y="86" text-anchor="middle" font-size="6" fill="#7a2aa8" opacity="0.5">♡</text>

// ── RARITY PICKER (with anti-repeat) ─────────────────────────────
let lastPulled = -1;

function pickIndex() {
  const r = Math.random();
  // secrets 2%
  if (r < 0.01)  return 34; // Handwritten Note
  if (r < 0.02)  return 33; // debug.exe
  // specials 8%
  if (r < 0.04)  return 27; // Naked Session
  if (r < 0.06)  return 28; // Boobies
  if (r < 0.075) return 29; // Antique Store
  if (r < 0.085) return 30; // Ankha
  if (r < 0.095) return 31; // Raymond
  if (r < 0.10)  return 32; // Day Off
  // rares 20%
  if (r < 0.15)  return 20; // Luna (her cat, bumped)
  if (r < 0.175) return 14; // Cassette
  if (r < 0.20)  return 15; // Isabelle
  if (r < 0.225) return 16; // Marshal
  if (r < 0.25)  return 17; // Merengue
  if (r < 0.275) return 18; // Music Box
  if (r < 0.30)  return 19; // Polaroid
  // trolls 15%
  if (r < 0.34)  return 21; // Pickle (targeted)
  if (r < 0.37)  return 23; // Grinch
  if (r < 0.39)  return 22; // Spider
  if (r < 0.41)  return 24; // Coco
  if (r < 0.43)  return 25; // Tom Nook
  if (r < 0.45)  return 26; // Sock
  // Olives bump 6%
  if (r < 0.51)  return 6;  // Olives (she likes them)
  // other commons 49%
  const commonIdx = [0, 1, 2, 3, 4, 5, 7, 8, 9, 10, 11, 12, 13];
  return commonIdx[Math.floor(Math.random() * commonIdx.length)];
}

function pickTrinket() {
  let idx;
  let attempts = 0;
  do {
    idx = pickIndex();
    attempts++;
  } while (idx === lastPulled && attempts < 3);
  lastPulled = idx;
  return trinkets[idx];
}

// ── PULL COUNTER ─────────────────────────────────────────────────
let pullCount = 0;
function updateCounter() {
  pullCount++;
  document.getElementById('pullCount').textContent = String(pullCount).padStart(2,'0');
}

// ── SWIPE LOGIC ──────────────────────────────────────────────────
let phase = 'idle';
let picked = null;
let touchStartY = 0, touchStartX = 0, touchStartTime = 0;
let isDraggingLid = false;

const scene = document.getElementById('scene');
const lid   = document.getElementById('lid');
const hint  = document.getElementById('hint');
const swipeArrow = document.getElementById('swipeArrow');

scene.addEventListener('touchstart', (e) => {
  if (phase === 'opened') return;
  touchStartY = e.touches[0].clientY;
  touchStartX = e.touches[0].clientX;
  touchStartTime = Date.now();
  isDraggingLid = true;
  lid.classList.add('dragging');
}, { passive: true });

scene.addEventListener('touchmove', (e) => {
  if (!isDraggingLid || phase === 'opened') return;
  e.preventDefault();
  const dy = touchStartY - e.touches[0].clientY;
  const dx = Math.abs(touchStartX - e.touches[0].clientX);
  if (dy > 0 && dy > dx) {
    const progress = Math.min(dy / 120, 1);
    lid.style.transform = `rotateX(${progress * -120}deg)`;
  }
}, { passive: false });

scene.addEventListener('touchend', (e) => {
  if (phase === 'opened') return;
  isDraggingLid = false;
  lid.classList.remove('dragging');
  const dy = touchStartY - e.changedTouches[0].clientY;
  const dx = Math.abs(touchStartX - e.changedTouches[0].clientX);
  const elapsed = Date.now() - touchStartTime;
  const velocity = dy / elapsed;
  if ((dy > 60 && dy > dx) || (velocity > 0.5 && dy > 20 && dy > dx)) {
    if (!picked) picked = pickTrinket();
    doOpen();
  } else {
    lid.style.transform = '';
    if (dy < 10 && dx < 10) doShake();
  }
}, { passive: true });

scene.addEventListener('click', () => { if (phase === 'idle') doShake(); });

function doShake() {
  if (phase !== 'idle') return;
  picked = pickTrinket();
  scene.classList.add('shaking');
  hint.classList.add('hide');
  swipeArrow.classList.add('show');
  setTimeout(() => {
    scene.classList.remove('shaking');
    hint.innerHTML = '<span class="arr">↑</span><span>now swipe up</span><span class="arr">↑</span>';
    hint.classList.remove('hide');
  }, 500);
}

function doOpen() {
  if (phase === 'opened') return;
  if (!picked) picked = pickTrinket();
  phase = 'opened';
  updateCounter();
  lid.style.transform = '';
  scene.classList.add('opened');
  swipeArrow.classList.remove('show');
  hint.classList.add('hide');

  const svg = document.getElementById('trinketSvg');
  svg.innerHTML = picked.svg;
  svg.style.filter = `drop-shadow(0 0 22px ${picked.glow})`;

  setTimeout(spawnParticles, 180);

  setTimeout(() => {
    const badge = document.getElementById('badge');
    badge.className = 'badge ' + picked.rarity;
    const labels = {
      common:  '♡ common',
      rare:    '✦ rare ✦',
      troll:   '☠ troll pull',
      secret:  '★ ultra secret ★',
      special: '♥ special unlock ♥'
    };
    badge.textContent = labels[picked.rarity];

    const nameEl = document.getElementById('tname');
    nameEl.innerHTML = picked.name.split('\n').join('<br>');
    document.getElementById('flavor').textContent = picked.flavor;
    document.getElementById('card').classList.add('show');
    document.getElementById('btn').classList.add('show');
  }, 600);
}

function doReset() {
  phase = 'idle'; picked = null;
  scene.classList.remove('opened', 'shaking');
  lid.style.transform = '';
  document.getElementById('trinketSvg').innerHTML = '';
  document.getElementById('card').classList.remove('show');
  document.getElementById('btn').classList.remove('show');
  swipeArrow.classList.remove('show');
  hint.innerHTML = '<span class="arr">↑</span><span>swipe up to open</span><span class="arr">↑</span>';
  hint.classList.remove('hide');
  document.getElementById('sealWrap').classList.remove('hidden');
}

// ── PARTICLES ────────────────────────────────────────────────────
function spawnParticles() {
  const colors = ['#ff6ec7','#c77dff','#ffd966','#ffb3d9','#ff9ac8','#ffffff'];
  const s = document.getElementById('scene').getBoundingClientRect();
  const cx = s.left + s.width / 2, cy = s.top + s.height * 0.35;
  const layer = document.getElementById('pLayer');
  for (let i = 0; i < 36; i++) {
    const p = document.createElement('div');
    p.className = 'pt';
    const angle = (i / 36) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
    const dist = 80 + Math.random() * 140, size = 3 + Math.random() * 9;
    p.style.cssText = `left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;animation-delay:${Math.random()*0.15}s;box-shadow:0 0 8px currentColor;`;
    layer.appendChild(p);
    setTimeout(() => p.remove(), 1400);
  }
}
